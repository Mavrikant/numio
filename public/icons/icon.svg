  <text x="356" y="188" font-family="'Courier New', monospace" font-size="52" font-weight="700" fill="#ffffff" text-anchor="end">0</text>

  <!-- Button grid: row 1 (light blue) -->
  <rect x="140" y="222" width="64" height="44" rx="10" fill="#334155"/>
  <text x="172" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#94a3b8" text-anchor="middle">C</text>

  <rect x="220" y="222" width="64" height="44" rx="10" fill="#334155"/>
  <text x="252" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#94a3b8" text-anchor="middle">±</text>

  <rect x="300" y="222" width="64" height="44" rx="10" fill="#334155"/>
  <text x="332" y="252" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#94a3b8" text-anchor="middle">%</text>

  <rect x="380" y="222" width="52" height="44" rx="10" fill="#0ea5e9"/>
  <text x="406" y="252" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">÷</text>

