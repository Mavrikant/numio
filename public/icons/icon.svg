<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0f172a"/>

  <!-- Calculator body -->
  <rect x="112" y="80" width="288" height="352" rx="28" fill="#1e293b" stroke="#334155" stroke-width="6"/>

  <!-- Display screen -->
