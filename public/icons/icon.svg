  <text x="332" y="421" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" text-anchor="middle">3</text>

  <rect x="380" y="396" width="52" height="36" rx="10" fill="#0ea5e9"/>
  <text x="406" y="421" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">+</text>
