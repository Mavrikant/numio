<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed background so the icon is safe as a maskable PWA icon -->
  <rect width="512" height="512" fill="#0ea5e9"/>
  <!-- Display screen -->
  <rect x="96" y="80" width="320" height="96" rx="24" fill="#082f49"/>
  <rect x="352" y="104" width="48" height="48" rx="8" fill="#38bdf8"/>
  <!-- Number dots -->
  <g fill="#ffffff">
    <circle cx="144" cy="256" r="24"/>
    <circle cx="224" cy="256" r="24"/>
    <circle cx="304" cy="256" r="24"/>
    <circle cx="144" cy="336" r="24"/>
    <circle cx="224" cy="336" r="24"/>
    <circle cx="144" cy="416" r="24"/>
    <circle cx="224" cy="416" r="24"/>
  </g>
  <!-- Accent operator key -->
  <rect x="272" y="312" width="96" height="120" rx="24" fill="#f97316"/>
  <text x="320" y="400" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="80" font-weight="700" fill="#ffffff">=</text>
</svg>
