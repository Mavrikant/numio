  <rect x="300" y="280" width="64" height="44" rx="10" fill="#475569"/>
  <text x="332" y="310" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" text-anchor="middle">9</text>

  <rect x="380" y="280" width="52" height="44" rx="10" fill="#0ea5e9"/>
  <text x="406" y="310" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>

  <!-- Button grid: row 3 -->
  <rect x="140" y="338" width="64" height="44" rx="10" fill="#475569"/>
  <text x="172" y="368" font-family="Arial, sans-serif" font-size="22" font-weight="600" fill="#f1f5f9" text-anchor="middle">4</text>

